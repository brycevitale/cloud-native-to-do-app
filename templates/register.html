<!doctype html>
<html>
<head>
    <title>Register | ToDo App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #e9eef7);
            color: #1f2937;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.5s ease;
        }

        .eyebrow {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 36px;
        }

        .subtext {
            margin: 0 0 28px 0;
            color: #6b7280;
            line-height: 1.5;
        }

        .message {
            background: #fff4f4;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 22px;
            text-align: center;
            color: #6b7280;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="eyebrow">Cloud Project</div>
            <h1>Create account</h1>
            <p class="subtext">
                Set up a personal account so you can track your tasks.
            </p>

            {% if message %}
                <div class="message">{{ message }}</div>
            {% endif %}

            <form action="/register" method="post">
                <!-- account creation -->
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Choose a username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Choose a password" required>

                <button type="submit">Create Account</button>
            </form>

            <div class="footer-text">
                Already have an account? <a href="/login">Log in here</a>
            </div>
        </div>
    </div>
</body>
</html>
