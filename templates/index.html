<!doctype html>
<html>
<head>
    <title>Your Tasks | ToDo App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 60px 24px;
        }

        .hero {
            background: linear-gradient(135deg, #111827, #1f3b73);
            color: white;
            border-radius: 22px;
            padding: 34px;
            margin-bottom: 28px;
            box-shadow: 0 18px 40px rgba(17, 24, 39, 0.18);
            animation: fadeUp 0.45s ease;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .hero h1 {
            margin: 0 0 10px 0;
            font-size: 40px;
        }

        .hero p {
            margin: 0;
            color: rgba(255, 255, 255, 0.88);
            line-height: 1.5;
        }

        .logout-link {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.14);
            padding: 10px 16px;
            border-radius: 10px;
            transition: background 0.15s ease;
        }

        .logout-link:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .welcome-badge {
            display: inline-block;
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.14);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
        }

        .section-card {
            background: white;
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
            animation: fadeUp 0.55s ease;
        }

        .section-title {
            margin: 0 0 18px 0;
            font-size: 24px;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-top: 1px solid #e5e7eb;
        }

        .task-row:first-of-type {
            border-top: none;
        }

        .task-main {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-name {
            font-size: 22px;
            font-weight: bold;
        }

        .task-date {
            color: #6b7280;
            font-size: 15px;
        }

        .done .task-name,
        .done .task-date {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .task-actions a {
            margin-left: 12px;
            text-decoration: none;
            font-weight: bold;
            color: #2563eb;
        }

        .task-actions a:hover {
            text-decoration: underline;
        }

        .empty {
            margin: 0;
            color: #6b7280;
            font-style: italic;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr auto;
            gap: 14px;
        }

        input {
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            background: #111827;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        @media (max-width: 820px) {
            .hero-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .task-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions a {
                margin-left: 0;
                margin-right: 14px;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div class="hero-top">
                <div>
                    <h1>Your Tasks</h1>
                    <p>
                        Dashboard
                    </p>
                    <div class="welcome-badge">
                        Logged in as <strong>{{ username }}</strong>
                    </div>
                </div>

                <div>
                    <a class="logout-link" href="/logout">Log Out</a>
                </div>
            </div>
        </div>

        <div class="section-card">
            <h2 class="section-title">Task List</h2>

            {% for entry in todolist %}
                <div class="task-row {% if entry.status == 'done' %}done{% endif %}">
                    <div class="task-main">
                        <!-- task name and date -->
                        <div class="task-name">{{ entry.what_to_do|safe }}</div>
                        <div class="task-date">Due: {{ entry.due_date|safe }}</div>
                    </div>

                    <div class="task-actions">
                        <a href="/mark/{{ entry.what_to_do }}">mark as done</a>
                        <a href="/delete/{{ entry.what_to_do }}">delete</a>
                    </div>
                </div>
            {% else %}
                <p class="empty">No tasks yet for this account.</p>
            {% endfor %}
        </div>

        <div class="section-card">
            <h2 class="section-title">Add a New Task</h2>

            <form action="/add" method="post" class="form-grid">
                <!-- quick task form -->
                <input type="text" name="what_to_do" placeholder="What needs to get done?" required>
                <input type="text" name="due_date" placeholder="Due date">
                <button type="submit">Add Task</button>
            </form>
        </div>
    </div>
</body>
</html>
